<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — L&A Solutions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-container">
            <a href="index.html" class="logo-link"><img src="logo.png" alt="L&A Solutions" class="logo"></a>
            <nav>
                <ul class="menu">
                    <li><a href="index.html">Home</a></li>
                    <li class="dropdown">
                        <a href="#">Profiles</a>
                        <ul class="dropdown-menu">
                            <li><a href="linus.html">Linus Kammonen</a></li>
                            <li><a href="alfred.html">Alfred Arvidsson</a></li>
                        </ul>
                    </li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="page-hero">
            <h1>Get in touch!</h1>
            <p></p>
        </div>

        <hr class="section-divider">

        <section class="contact-section">
            <div class="contact-grid">

                <div class="contact-info">
                    <h2>Contact details</h2>
                    <div class="info-item">
                        <span class="info-label">Email</span>
                        <a href="mailto:hello@lasolutions.se">contact@lasolutions.se</a>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Based in</span>
                        <span>Uppsala, Sweden</span>
                    </div>
                </div>

                <form name="L&A Kontakt" class="contact-form" data-netlify="true" netlify-honeypot="bot-field" action="/thankyou" method="POST">                    <input type="hidden" name="_subject" value="New message from L&A Solutions website">
                    <input type="hidden" name="bot-field">
                    <input type="text" name="_gotcha" style="display:none">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Your name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="6" placeholder="Tell us about your project..." required></textarea>
                    </div>
                    <button type="submit" class="btn-primary">Send message</button>
                </form>

            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 L&A Solutions. Based in Uppsala, Sweden.</p>
    </footer>

</body>
</html>
